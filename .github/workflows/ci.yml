name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: lint · migrate · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (prod deps + dev tools) — mirrors the prod bootstrap
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio ruff mypy types-PyYAML
      - name: Lint + format + types
        run: |
          ruff check .
          ruff format --check .
          mypy
      - name: Migrate from the real schema (Alembic)
        run: alembic upgrade head
      - name: Test
        run: pytest -q
      - name: Build + smoke-run the wheel (prod-bootstrap parity)
        run: |
          pip install build
          python -m build --wheel
          pip install dist/*.whl --force-reinstall
          GATEKEEPER_HMAC_KEY="$(openssl rand -hex 32)" gatekeeper health

  security:
    name: secret-scan · dep-vuln (fail-closed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # gitleaks scans full history
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required by the action to scan PRs
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependency CVE scan (pip-audit) — blocks merge on a known CVE
        run: |
          pip install pip-audit
          pip install -e .
          pip-audit --strict
