name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read   # gitleaks-action lists PR commits via the API

jobs:
  quality:
    name: lint · migrate · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (prod deps + demo target + dev tools) — mirrors the prod bootstrap
        run: |
          python -m pip install --upgrade pip
          # `.[demo]` adds the real third-party MCP server (mcp-server-time) so the M1.4
          # "govern ANY server, zero code" integration test runs for real in CI (not skipped).
          pip install -e ".[demo]"
          pip install pytest pytest-asyncio pytest-timeout ruff mypy types-PyYAML
      - name: Lint + format + types
        run: |
          ruff check .
          ruff format --check .
          mypy
      - name: Migrate from the real schema (Alembic)
        run: alembic upgrade head
      - name: Test
        run: pytest -q
      - name: Build + smoke-run the wheel (prod-bootstrap parity)
        run: |
          pip install build
          python -m build --wheel
          pip install dist/*.whl --force-reinstall
          GATEKEEPER_HMAC_KEY="$(openssl rand -hex 32)" gatekeeper health

  container:
    name: container build · healthz smoke (M3.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build the image
        run: docker build -t gatekeeper:ci .
      - name: Boot + liveness smoke (migrate -> serve -> /healthz)
        run: |
          docker run -d --name gk -p 8765:8765 \
            -e GATEKEEPER_HMAC_KEY="$(openssl rand -hex 32)" gatekeeper:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/healthz; then ok=1; break; fi; sleep 1;
          done
          docker logs gk
          [ "${ok:-0}" = "1" ]   # fail the job if /healthz never came up
      - name: Ledger migrated + verify runs inside the container
        run: docker exec gk gatekeeper verify

  security:
    name: secret-scan · dep-vuln (fail-closed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # gitleaks scans full history
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required by the action to scan PRs
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Dependency CVE scan (pip-audit) — blocks merge on a known CVE
        run: |
          python -m pip install --upgrade pip   # keep pip current (it is itself audited)
          pip install pip-audit
          # `.[demo]` so the demo target's dependency (mcp-server-time + its transitive deps) is
          # CVE-scanned too — it is installed and exercised by the quality job, so it must be audited.
          pip install -e ".[demo]"
          # --skip-editable skips our own local package (not on PyPI). pip-audit still exits non-zero
          # on any real dependency CVE (that is independent of --strict), so the gate stays fail-closed.
          pip-audit --skip-editable
