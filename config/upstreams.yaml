# upstreams.yaml — the registry that makes GateKeeperAI tool-agnostic.
# Add ANY MCP server here to bring it under governance. ZERO code per server.
# This is the file that proves the M1.4 exit criterion ("govern a 2nd server by config edit alone").

upstreams:
  - name: demo-files            # logical id used in policy + audit
    transport: stdio
    command: ["python", "-m", "examples.demo_file_server"]   # how to launch/reach the server
    # Optional explicit write annotations (override write_detection name_patterns):
    writes: ["write_file", "delete_file"]
    reads:  ["read_file", "list_dir"]

  # M1.4 proof — "govern ANY server, zero code": `time` is a REAL, third-party MCP server we did NOT
  # write (the official `mcp-server-time`, installed via `pip install -e ".[demo]"`). It is brought
  # under full governance — identity, RBAC, tamper-evident audit — purely by THIS config block; not a
  # single line of src/gatekeeper/ changes. Add any other MCP server the same way.
  - name: time
    transport: stdio
    command: ["python", "-m", "mcp_server_time", "--local-timezone", "UTC"]
    reads:  ["get_current_time", "convert_time"]   # both are reads (no mutation) — config-classified
    writes: []

  # Example: a real GitHub MCP server that needs a credential. Secrets are referenced by NAME via
  # `{ from_env: VAR }` — the VALUE is read from .env / the process env at launch and is NEVER stored
  # in this file (the project rule: secrets live in .env, only their names appear in YAML). A
  # referenced-but-unset secret is fail-closed (the gateway refuses to start with a clear error).
