<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="560" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="500" y="44" text-anchor="middle" font-size="28" font-weight="700" fill="#0F172A">How GateKeeperAI works</text>
  <text x="500" y="74" text-anchor="middle" font-size="16" fill="#475569">A security guard that sits between your AI assistant and the tools it uses</text>

  <!-- ============ AGENT (left) ============ -->
  <rect x="40" y="175" width="210" height="150" rx="14" fill="#E8F1FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="145" y="210" text-anchor="middle" font-size="17" font-weight="700" fill="#1E3A8A">The agent</text>
  <text x="145" y="234" text-anchor="middle" font-size="13" fill="#1E40AF">(your AI assistant)</text>
  <!-- badge -->
  <rect x="105" y="250" width="80" height="50" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="145" y="270" text-anchor="middle" font-size="11" fill="#1E3A8A">BADGE</text>
  <text x="145" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#1E3A8A">(a token)</text>

  <!-- Arrow agent -> guard -->
  <line x1="250" y1="250" x2="338" y2="250" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="294" y="240" text-anchor="middle" font-size="12" fill="#334155">shows its badge</text>

  <!-- ============ GUARD (center) ============ -->
  <rect x="340" y="100" width="320" height="300" rx="16" fill="#F1F5F9" stroke="#0EA5E9" stroke-width="2.5"/>
  <rect x="340" y="100" width="320" height="44" rx="16" fill="#0EA5E9"/>
  <rect x="340" y="124" width="320" height="20" fill="#0EA5E9"/>
  <text x="500" y="129" text-anchor="middle" font-size="18" font-weight="700" fill="#FFFFFF">THE GUARD — GateKeeperAI</text>

  <!-- step 1 -->
  <rect x="360" y="156" width="280" height="48" rx="9" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="384" cy="180" r="11" fill="#0EA5E9"/>
  <text x="384" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
  <text x="406" y="177" font-size="13.5" font-weight="600" fill="#0F172A">Check the badge</text>
  <text x="406" y="194" font-size="12" fill="#475569">who is this? (identity)</text>

  <!-- step 2 -->
  <rect x="360" y="212" width="280" height="48" rx="9" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="384" cy="236" r="11" fill="#0EA5E9"/>
  <text x="384" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
  <text x="406" y="233" font-size="13.5" font-weight="600" fill="#0F172A">Check the rulebook</text>
  <text x="406" y="250" font-size="12" fill="#475569">may this role do this? (policy)</text>

  <!-- step 3 -->
  <rect x="360" y="268" width="280" height="48" rx="9" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="384" cy="292" r="11" fill="#0EA5E9"/>
  <text x="384" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
  <text x="406" y="289" font-size="13.5" font-weight="600" fill="#0F172A">Write the logbook</text>
  <text x="406" y="306" font-size="12" fill="#475569">tamper-proof record (audit)</text>

  <!-- step 4 -->
  <rect x="360" y="324" width="280" height="48" rx="9" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="384" cy="348" r="11" fill="#0EA5E9"/>
  <text x="384" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
  <text x="406" y="345" font-size="13.5" font-weight="600" fill="#0F172A">Forward — or block</text>
  <text x="406" y="362" font-size="12" fill="#475569">allowed goes through; denied stops here</text>

  <!-- Arrow guard -> tools -->
  <line x1="660" y1="250" x2="748" y2="250" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="704" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#16A34A">allow</text>
  <text x="704" y="272" text-anchor="middle" font-size="12" font-weight="600" fill="#DC2626">or block</text>

  <!-- ============ TOOLS (right) ============ -->
  <rect x="750" y="140" width="210" height="220" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="855" y="170" text-anchor="middle" font-size="17" font-weight="700" fill="#065F46">The tools</text>
  <text x="855" y="190" text-anchor="middle" font-size="12" fill="#047857">(MCP servers)</text>
  <text x="855" y="224" text-anchor="middle" font-size="13.5" fill="#064E3B">Files</text>
  <text x="855" y="252" text-anchor="middle" font-size="13.5" fill="#064E3B">GitHub</text>
  <text x="855" y="280" text-anchor="middle" font-size="13.5" fill="#064E3B">Databases</text>
  <text x="855" y="308" text-anchor="middle" font-size="13.5" fill="#064E3B">The clock</text>
  <text x="855" y="336" text-anchor="middle" font-size="13.5" font-style="italic" fill="#047857">…any MCP server</text>

  <!-- ============ LEGEND (bottom) ============ -->
  <rect x="40" y="430" width="920" height="100" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="60" y="458" font-size="14" font-weight="700" fill="#0F172A">The badges (who can do what):</text>

  <rect x="60" y="470" width="14" height="14" rx="3" fill="#3B82F6"/>
  <text x="82" y="482" font-size="13" fill="#334155"><tspan font-weight="600">alice</tspan> — operator badge: may read AND write</text>

  <rect x="60" y="494" width="14" height="14" rx="3" fill="#64748B"/>
  <text x="82" y="506" font-size="13" fill="#334155"><tspan font-weight="600">bob</tspan> — read-only badge: may read, never write (blocked)</text>

  <rect x="430" y="470" width="14" height="14" rx="3" fill="#0F172A"/>
  <text x="452" y="482" font-size="13" fill="#334155"><tspan font-weight="600">root</tspan> — admin badge: full access</text>

  <text x="430" y="506" font-size="13" font-weight="600" fill="#0369A1">The rules and the list of tools live in plain settings files — not in code.</text>

  <text x="950" y="524" text-anchor="end" font-size="11" fill="#94A3B8">GateKeeperAI · verifiable governance for MCP</text>
</svg>
